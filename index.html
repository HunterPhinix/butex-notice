<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUTEX Notice | Unofficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full bg-gray-800 rounded-xl p-8 text-center shadow-lg">
        <img src="YOUR_BUTEX_LOGO_URL" alt="BUTEX Logo" class="w-24 h-24 mx-auto mb-4">
        <h1 class="text-3xl font-bold mb-2">BUTEX Notice</h1>
        <div class="flex justify-center space-x-2 mb-6">
            <span class="bg-blue-600 text-xs px-2 py-1 rounded">🤖 Automated</span>
            <span class="bg-red-600 text-xs px-2 py-1 rounded">⚠️ Unofficial</span>
        </div>
        <p class="text-gray-400 mb-8">Automatically monitors the BUTEX website for new posts and sends formatted announcements to the Telegram Channel.</p>
        
        <a href="https://t.me/yourchannel" target="_blank" class="block w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-4 rounded-lg transition">
            Open Channel
        </a>

        <div class="mt-8 text-left">
            <h3 class="text-sm text-gray-400 uppercase tracking-wide mb-2">Tech Stack</h3>
            <div class="flex flex-wrap gap-2">
                <span class="bg-gray-700 px-3 py-1 rounded-full text-sm">Node.js</span>
                <span class="bg-gray-700 px-3 py-1 rounded-full text-sm">Vercel Serverless</span>
                <span class="bg-gray-700 px-3 py-1 rounded-full text-sm">Telegram Bot API</span>
                <span class="bg-gray-700 px-3 py-1 rounded-full text-sm">Vercel KV</span>
            </div>
        </div>
    </div>
</body>
</html>
